# render.yaml — deploys the FloodGuard backend API on Render (free tier)
# Docs: https://render.com/docs/blueprint-spec
#
# The frontend is hosted separately on Netlify (see netlify.toml).
# Variables marked "sync: false" must be set manually in the Render dashboard
# — the Blueprint will not override them.

services:
  - type: web
    name: floodguard-api
    runtime: node
    region: oregon
    plan: free
    rootDir: floodguard-backend
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: node src/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # Set these manually in the Render dashboard after the service is created.
      # "sync: false" means this file will never override what you set there.
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: TWITTER_BEARER
        sync: false
